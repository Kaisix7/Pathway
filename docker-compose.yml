services:
  db:
    image: postgres:16-alpine
    container_name: pathway_db
    environment:
      POSTGRES_DB: pathway
      POSTGRES_USER: pathway
      POSTGRES_PASSWORD: pathway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: pathway_backend
    command: sh -c "until pg_isready -h db -U pathway; do sleep 1; done && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,10.0.2.2
      POSTGRES_DB: pathway
      POSTGRES_USER: pathway
      POSTGRES_PASSWORD: pathway
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432

volumes:
  postgres_data:
